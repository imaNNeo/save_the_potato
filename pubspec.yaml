name: save_the_potato
description: "Save The Potato – Get ready for some non-stop, spin-tastic fun! Your goal? Keep our potato pal from turning into a hot tot or an ice cube."
publish_to: 'none'
version: 1.5.3+10503

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flame: ^1.35.1
  flame_noise: ^0.3.2+20
  flutter_bloc: ^9.1.1
  flame_bloc: ^1.12.21
  equatable: ^2.0.8
  flame_rive: ^1.10.23
  rive: ^0.13.20
  shared_preferences: ^2.5.4
  get_it: ^9.2.1
  flutter_animate: ^4.5.2
  flutter_secure_storage: ^10.0.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3
  cloud_functions: ^6.0.7
  toastification: ^3.0.3
  url_launcher: ^6.3.2
  device_info_plus: ^12.3.0
  uuid: ^4.5.3
  package_info_plus: ^9.0.0
  flutter_svg: ^2.2.3
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  stream_transform: ^2.1.1
  flutter_soloud: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  fonts:
    - family: Cookies
      fonts:
        - asset: assets/fonts/Cookies.ttf

  assets:
    - assets/images/flame/
    - assets/images/flutter_flame/
    - assets/images/snow/
    - assets/images/sparkle/
    - assets/images/orb/
    - assets/images/heart/
    - assets/images/trophy/
    - assets/images/icons/
    - assets/images/
    - assets/fonts/
    - assets/audio/
    - assets/audio/motivation/
    - assets/rive/
    - assets/logo/

flutter_launcher_icons:
  android: false
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo-1024.png"
  min_sdk_android: 21